services:
  postgres:
    image: postgres:15-alpine
    container_name: ninesun-blog-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ninesun}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ninesun123}
      POSTGRES_DB: ${POSTGRES_DB:-ninesun_blog}
    ports:
      - "5441:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ninesun} -d ${POSTGRES_DB:-ninesun_blog}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: ninesun-blog-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-redis123}
    ports:
      - "6388:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redis123}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ninesun-blog-backend
    restart: unless-stopped
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-ninesun_blog}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-ninesun}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-ninesun123}
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_DATA_REDIS_PASSWORD: ${REDIS_PASSWORD:-redis123}
      JWT_SECRET: ${JWT_SECRET:-your-jwt-secret-key-change-in-production}
      SITE_URL: ${SITE_URL:-http://localhost:8999}
    ports:
      - "8089:8089"
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ninesun-blog-frontend
    restart: unless-stopped
    ports:
      - "8999:80"
    depends_on:
      - backend

volumes:
  postgres_data:
  redis_data:
  uploads_data:
