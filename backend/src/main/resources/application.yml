server:
  port: 8089

spring:
  application:
    name: ninesun-blog
  config:
    import: optional:file:./.env[.properties]
  
  jackson:
    time-zone: Asia/Shanghai
    date-format: yyyy-MM-dd HH:mm:ss
  
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5441/${POSTGRES_DB:ninesun_blog}}
    username: ${SPRING_DATASOURCE_USERNAME:${POSTGRES_USER:ninesun}}
    password: ${SPRING_DATASOURCE_PASSWORD:${POSTGRES_PASSWORD:ninesun123}}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
  
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  
  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: ${SPRING_DATA_REDIS_PORT:6388}
      password: ${SPRING_DATA_REDIS_PASSWORD:${REDIS_PASSWORD:redis123}}
      timeout: 10000ms
  
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 20MB

jwt:
  secret: ${JWT_SECRET:your-jwt-secret-key-change-in-production}
  expiration: 86400000

app:
  site-url: ${SITE_URL:http://localhost:8999}
  upload:
    dir: ${UPLOAD_DIR:uploads}
  encryption:
    key: ${ENCRYPTION_KEY:}

geoip:
  database:
    path: ${GEOIP_DATABASE_PATH:data/GeoLite2-City.mmdb}

openai:
  api-key: ${OPENAI_API_KEY:}
  base-url: ${OPENAI_BASE_URL:https://api.openai.com/v1}
  embedding-model: ${OPENAI_EMBEDDING_MODEL:text-embedding-v4}
  chat-model: ${OPENAI_CHAT_MODEL:glm-5}

rag:
  max-context-articles: ${RAG_MAX_CONTEXT_ARTICLES:5}
  max-context-length: ${RAG_MAX_CONTEXT_LENGTH:4000}

github:
  client-id: ${GITHUB_CLIENT_ID:}
  client-secret: ${GITHUB_CLIENT_SECRET:}

twitter:
  client-id: ${TWITTER_CLIENT_ID:}
  client-secret: ${TWITTER_CLIENT_SECRET:}

logging:
  level:
    root: INFO
    com.ninesun.blog: DEBUG
    org.hibernate.SQL: DEBUG
