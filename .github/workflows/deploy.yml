name: 🚀 Build and Deploy Ninesun Blog

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  REGISTRY: docker.io
  IMAGE_NAME: ninesun-blog

jobs:
  # ============================================
  # 1. 构建并推送 Docker 镜像
  # ============================================
  build:
    name: 🏗️ Build Docker Images
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: 🔑 Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 构建后端应用
      - name: ☕ Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 🏗️ Build Backend with Maven
        run: mvn clean package -DskipTests
        working-directory: ./backend

      # 构建后端镜像
      - name: 🏗️ Build Backend Image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}-backend:latest
            ${{ env.REGISTRY }}/${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}-backend:${{ github.sha }}

      # 构建前端镜像
      - name: 🏗️ Build Frontend Image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}-frontend:latest
            ${{ env.REGISTRY }}/${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}-frontend:${{ github.sha }}

  # ============================================
  # 2. 部署到服务器
  # ============================================
  deploy:
    name: 🚀 Deploy to Server
    runs-on: ubuntu-latest
    needs: [build]

    steps:
      - name: 🚀 Deploy via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          port: 22
          script: |
            set -e
            
            echo "=========================================="
            echo "🚀 Ninesun Blog 部署开始"
            echo "=========================================="
            
            cd /opt/ninesun-blog
            
            # 拉取最新镜像
            echo "📋 拉取最新 Docker 镜像..."
            docker pull ${{ secrets.DOCKER_USERNAME }}/ninesun-blog-backend:latest
            docker pull ${{ secrets.DOCKER_USERNAME }}/ninesun-blog-frontend:latest
            docker pull postgres:15-alpine
            docker pull redis:7-alpine
            
            # 停止旧服务
            echo "🛑 停止旧服务..."
            docker compose -f docker-compose.prod.yml down || true
            
            # 启动服务
            echo "🚀 启动服务..."
            docker compose -f docker-compose.prod.yml up -d
            
            echo "✅ 容器启动成功"
            
            # 等待服务启动
            echo "⏳ 等待服务启动..."
            sleep 20
            
            # 检查容器状态
            echo "📊 检查容器状态..."
            docker compose -f docker-compose.prod.yml ps
            
            # 健康检查 - 后端
            echo "🧪 执行后端健康检查..."
            for i in {1..5}; do
              if curl -s http://localhost:8089/api/health > /dev/null 2>&1; then
                echo "✅ 后端服务健康检查通过"
                break
              fi
              if [ $i -eq 5 ]; then
                echo "⚠️ 后端健康检查失败，查看日志..."
                docker compose -f docker-compose.prod.yml logs backend --tail=100
                exit 1
              fi
              echo "⏳ 等待后端就绪... ($i/5)"
              sleep 5
            done
            
            # 健康检查 - 前端
            echo "🧪 执行前端健康检查..."
            for i in {1..5}; do
              if curl -s http://localhost:8999 > /dev/null 2>&1; then
                echo "✅ 前端服务健康检查通过"
                break
              fi
              if [ $i -eq 5 ]; then
                echo "⚠️ 前端健康检查失败，查看日志..."
                docker compose -f docker-compose.prod.yml logs frontend --tail=100
                exit 1
              fi
              echo "⏳ 等待前端就绪... ($i/5)"
              sleep 5
            done
            
            # 检查数据库连接
            echo "📊 检查数据库连接..."
            docker exec ninesun-blog-postgres pg_isready -U ninesun -d ninesun_blog && echo "✅ 数据库连接正常" || echo "⚠️ 数据库连接异常"
            
            # 检查 Redis 连接
            echo "📊 检查 Redis 连接..."
            docker exec ninesun-blog-redis redis-cli -a redis123 ping && echo "✅ Redis 连接正常" || echo "⚠️ Redis 连接异常"
            
            echo ""
            echo "=========================================="
            echo "✅ 部署完成！"
            echo "=========================================="
            echo "访问地址: https://blog.ninesun.site"
